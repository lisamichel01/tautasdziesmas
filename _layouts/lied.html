<!--Tabs zum Sprachenwechseln in mobiler Ansicht-->
<script>
const original = `{{ page.original }}`;
const uebersetzung = `{{ page.uebersetzung }}`;

function zeigeTab(tab) {
  if (window.innerWidth > 600) return;
  document.getElementById('liedtext').innerHTML = tab === 'original' ? original : uebersetzung;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('aktiv'));
  event.target.classList.add('aktiv');
}
</script>

<!--Anzeigen von Tooltips oben oder unten, abhängig davon, wo Platz ist-->
<script>
document.querySelectorAll('.tooltip').forEach(tooltip => {
  // Desktop
  tooltip.addEventListener('mouseenter', function() {
    zeigeTooltip(this);
  });
  
  tooltip.addEventListener('mouseleave', function() {
    verbergeTooltip(this);
  });

  // Mobile
  tooltip.addEventListener('touchstart', function(e) {
    e.preventDefault();
    zeigeTooltip(this);
  });
});

function zeigeTooltip(tooltip) {
  const tooltiptext = tooltip.querySelector('.tooltiptext');
  tooltiptext.style.visibility = 'visible';
  const rect = tooltiptext.getBoundingClientRect();
  console.log('rect.right:', rect.right, 'window.innerWidth:', window.innerWidth);
  //oben/unten
  if (rect.top < 0) {
    tooltiptext.style.bottom = 'auto';
    tooltiptext.style.top = '125%';
  } else {
    tooltiptext.style.bottom = '125%';
    tooltiptext.style.top = 'auto';
  }
}

function verbergeTooltip(tooltip) {
  tooltip.querySelector('.tooltiptext').style.visibility = 'hidden';
}</script>
