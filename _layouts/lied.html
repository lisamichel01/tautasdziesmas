---
layout: page
---

<p class="info">{{ page.zusatzinfo }}</p>

<div class="tabs-mobile">
  <button class="tab-btn aktiv" onclick="zeigeTab('original')">Lettisch</button>
  <button class="tab-btn" onclick="zeigeTab('uebersetzung')">Deutsch</button>
</div>

<div class="lyrics">
  <div id="liedtext">{{ page.original }}</div>
  <div id="liedtext-uebersetzung">{{ page.uebersetzung }}</div>
</div>

<!--Tabs zum Sprachenwechseln in mobiler Ansicht-->
<script>
const original = `{{ page.original }}`;
const uebersetzung = `{{ page.uebersetzung }}`;

function zeigeTab(tab) {
  if (window.innerWidth > 600) return;
  document.getElementById('liedtext').innerHTML = tab === 'original' ? original : uebersetzung;
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('aktiv'));
  event.target.classList.add('aktiv');
}
</script>

<!--Anzeigen von Tooltips oben oder unten, abhängig davon, wo Platz ist-->
<!--Anzeigen von Tooltips oben oder unten, abhängig davon, wo Platz ist-->
<script>
document.querySelectorAll('.tooltip').forEach(tooltip => {
  // Desktop
  tooltip.addEventListener('mouseenter', function() {
    zeigeTooltip(this);
  });
  
  tooltip.addEventListener('mouseleave', function() {
    verbergeTooltip(this);
  });
  // Mobile
  tooltip.addEventListener('touchstart', function(e) {
    e.preventDefault();
    e.stopPropagation();
    zeigeTooltip(this);
  });
});

// Tooltip schließen, wenn woanders hingetippt wird
document.addEventListener('touchstart', function(e) {
  const istTooltip = e.target.closest('.tooltip');
  if (!istTooltip) {
    document.querySelectorAll('.tooltip').forEach(verbergeTooltip);
  }
});

function zeigeTooltip(tooltip) {
  const tooltiptext = tooltip.querySelector('.tooltiptext');
  tooltiptext.style.visibility = 'visible';
  
  const tooltipRect = tooltip.getBoundingClientRect();
  const tooltiptextHeight = tooltiptext.offsetHeight;
  
  let top;
  if (tooltipRect.top - tooltiptextHeight - 8 < 0) {
    top = tooltipRect.bottom + 8;
  } else {
    top = tooltipRect.top - tooltiptextHeight - 8;
  }
  
  if (top + tooltiptextHeight > window.innerHeight) {
    top = window.innerHeight - tooltiptextHeight - 8;
  }
  if (top < 8) {
    top = 8;
  }
  
  tooltiptext.style.top = top + 'px';
}

function verbergeTooltip(tooltip) {
  tooltip.querySelector('.tooltiptext').style.visibility = 'hidden';
}
</script>
